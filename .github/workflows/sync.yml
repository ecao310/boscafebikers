name: Sync rides

on:
  schedule:
    # Every 6 hours, on the hour (UTC).
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: sync-rides
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch rides
        env:
          PARTIFUL_ICS_URL: ${{ secrets.PARTIFUL_ICS_URL }}
        # Write to a scratch file first: build_payload() stamps a fresh
        # updated_at every run, so site/events.json would always look changed.
        run: python scripts/fetch_rides.py --out "$RUNNER_TEMP/events.json"

      - name: Update site/events.json only if the rides changed
        run: python scripts/promote_events.py "$RUNNER_TEMP/events.json" site/events.json

      - name: Commit site/events.json if changed
        id: commit
        run: |
          if git diff --quiet -- site/events.json; then
            echo "No ride changes; nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/events.json
          git commit -m "Sync rides from Partiful feed"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  # The push above uses GITHUB_TOKEN, which deliberately does not fire `push`
  # workflow triggers — so Pages would never redeploy. Call the deploy workflow
  # ourselves instead, and only when the rides actually changed.
  deploy:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
