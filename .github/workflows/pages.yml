name: Deploy site to Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:
  # Callable by sync.yml: commits pushed with GITHUB_TOKEN do not fire the
  # `push` trigger above, so the sync workflow has to invoke this one directly.
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue at most one more behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Deploy the branch tip, not the SHA that started the run: when
          # sync.yml calls this workflow, github.sha still points at the commit
          # from *before* the bot pushed the new site/events.json.
          ref: ${{ github.ref }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # The site lives in site/, which "deploy from a branch" cannot publish
      # (it only offers / and /docs) — hence the Actions source.
      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
